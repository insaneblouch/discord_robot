<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Raw Data</title>
</head>
<body>
    <pre id="raw-data">載入中...</pre>

    <script>
        async function fetchData() {
            try {
                // 為了避免快取，加上時間戳記
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                // 將陣列內容用換行符號連接成純文字，不包含括號和引號
                document.getElementById('raw-data').textContent = data.items.join('\n');
            } catch (error) {
                document.getElementById('raw-data').textContent = '讀取失敗: ' + error.message;
            }
        }
        fetchData();
    </script>
</body>
</html>
